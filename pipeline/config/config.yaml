data:
  source: "kaggle"                    # "kaggle", "local", "huggingface"
  kaggle_dataset: "aifymag/aptos-2024-blindness-detection"
  local_path: "data/images"
  label_file: "data/train.csv"
  img_size: 512
  val_split: 0.15
  test_split: 0.10
  seed: 42
  apply_clahe: true
  clahe_clip_limit: 2.0
  clahe_grid_size: 8

augmentation:
  train:
    horizontal_flip: true
    vertical_flip: false
    rotation_limit: 30
    brightness_contrast: [0.8, 1.2]
    hue_saturation: [0.0, 0.1]
    scale_limit: 0.15
    cutoff_height: 0.1
    cutoff_width: 0.1
  eval:
    horizontal_flip: false

model:
  architecture: "efficientnet_b4"
  pretrained: true
  num_classes: 5
  dropout: 0.3

training:
  batch_size: 16
  epochs: 50
  lr: 0.0001
  weight_decay: 0.01
  scheduler: "cosine"                # "cosine", "step", "plateau"
  early_stop_patience: 10
  gradient_clip: 1.0
  label_smoothing: 0.1
  mixed_precision: true
  workers: 4
  resume_from: null

logging:
  use_mlflow: false
  mlflow_tracking_uri: "outputs/mlruns"
  experiment_name: "retinascreen"
  log_every_n_steps: 50
  save_every_n_epochs: 5

export:
  onnx: true
  onnx_opset: 17
  output_dir: "outputs/exports"
